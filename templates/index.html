<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Employee Salary Prediction</h1>

        <form action="/predict" method="POST">

            <!-- Education -->

            <label for="education">Education</label>

            <select name="education" id="education" required>

                <option value="">-- Select Education --</option>
                <option value="0">B.Tech</option>
                <option value="1">M.Tech</option>
                <option value="2">MCA</option>

            </select>

            <br>

            <!-- Experience -->

            <label for="experience">Experience (Years : 0 - 40)</label>

            <input
                type="number"
                id="experience"
                name="experience"
                min="0"
                max="40"
                step="0.5"
                placeholder="Example: 5"
                required
            >

            <small>Enter your total years of experience.</small>

            <br><br>

            <!-- Skill Score -->

            <label for="skill_score">Skill Score (0 - 100)</label>

            <input
                type="number"
                id="skill_score"
                name="skill_score"
                min="0"
                max="100"
                placeholder="Example: 75"
                required
            >

            <small>Enter a value between 0 and 100.</small>

            <br><br>

            <!-- Button -->

            <button type="submit">
                Predict Salary
            </button>

        </form>

        <!-- Prediction Result -->

        {% if prediction %}

        <div class="result">

            <h2>Predicted Salary</h2>

            <h3>₹ {{ prediction }}</h3>

        </div>

        {% endif %}

    </div>

</body>

</html>
